# fly.toml app configuration file generated for opp-resolver-site on 2026-07-18T21:17:50-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'opp-resolver-site'
primary_region = 'lax'

[build]
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512

[env]
  APP_ENV = "production"
  OPP_DIRECTORY_URL = "https://directory.openpresenceprotocol.org"
